name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: x64
            python-version: "3.12"
          - os: windows-latest
            arch: arm64
            python-version: "3.12"

          # Linux
          - os: ubuntu-latest
            arch: x64
            python-version: "3.12"
          - os: ubuntu-latest
            arch: arm64
            python-version: "3.12"

          # macOS (macos-15-intel for x64; macos-latest for arm64)
          - os: macos-15-intel
            arch: x64
            python-version: "3.12"
          - os: macos-latest
            arch: arm64
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-nuitka
          max-size: 2G

      # Set ccache environment variables for Nuitka
      # Nuitka finds compilers via PATH, ignoring CC/CXX env vars.
      # Prepend ccache wrapper dir to PATH so Nuitka picks up ccache-wrapped gcc/clang.
      - name: Set ccache env vars
        run: |
          echo "CCACHE_CPP2=yes" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "/usr/lib/ccache" >> $GITHUB_PATH
          fi
          # macOS PATH is set in "Configure ccache" step after brew install
          # Windows: MSVC doesn't support ccache, Nuitka uses --disable-ccache
        shell: bash

      # Set MSVC heap limit for Windows (prevents C1002 errors on large modules)
      - name: Set MSVC env vars
        if: runner.os == 'Windows'
        run: |
          # Increase compiler heap limit (500MB instead of default)
          echo "CL=/Zm500" >> $env:GITHUB_ENV
          # Prevent MSYS2/Git Bash from converting /Zm500 to C:/Program Files/Git/Zm500
          echo "MSYS_NO_PATHCONV=1" >> $env:GITHUB_ENV
        shell: pwsh

      # --- INSTALL SYSTEM DEPS ---

      - name: Linux deps (x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf dpkg \
            build-essential fakeroot

      - name: Linux deps (arm64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf dpkg \
            build-essential fakeroot

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg ccache
          brew unlink openssl@3 || true
          # Verify clang and ccache are available
          clang --version | head -1
          ccache --version | head -1

      # Configure ccache for macOS (after installing deps)
      - name: Configure ccache
        if: runner.os == 'macOS'
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compiler_check=content
          ccache -p
          # Add ccache compiler symlinks to PATH so Nuitka finds them first
          echo "$(brew --prefix)/libexec/ccache" >> $GITHUB_PATH
        shell: bash

      # ---------------------------------

      - name: Install Python deps
        run: |
          python -m pip install -U pip wheel
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build with Nuitka
        env:
          APP_VERSION: dev
        run: |
          python build.py
        shell: bash

      # --- SMOKE TESTS ---

      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "dist/TranslatorHoi4/TranslatorHoi4"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "dist/TranslatorHoi4/TranslatorHoi4.exe" --smoke'

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "true"
        run: xvfb-run -a ./dist/TranslatorHoi4/TranslatorHoi4 --smoke

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        env:
          CI: "true"
        run: |
          echo "Verifying macOS .app bundle structure..."
          # Verify .app bundle exists and has correct structure
          test -d "dist/TranslatorHoi4.app/Contents/MacOS"
          test -f "dist/TranslatorHoi4.app/Contents/MacOS/TranslatorHoi4"
          echo "✓ macOS bundle structure verified"

      # --- UPLOAD ARTIFACTS ---

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorHoi4-${{ runner.os }}-${{ matrix.arch }}
          # macOS: .app bundle directly in dist/; others: folder structure
          path: ${{ runner.os == 'macOS' && 'dist/TranslatorHoi4.app/' || 'dist/TranslatorHoi4/' }}
          if-no-files-found: error

  # --- PACKAGE WINDOWS (ZIP + Inno Setup) ---
  package-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Windows x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x64
          path: ./dist/TranslatorHoi4

      - name: Download Windows arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Windows arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      # Inno Setup installer (x64)
      - name: Build Inno Setup installer
        if: always()
        run: |
          # Download Inno Setup (using portable version from Chocolatey or manual install)
          choco install innosetup --no-progress
          
          # Install Pillow for icon conversion
          pip install Pillow
          
          # Convert PNG to ICO for Inno Setup
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])
          print('Icon converted to ICO format')
          "
          
          iscc packaging\translatorhoi4-setup.iss
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.build.outputs.version || '0.1' }}

      - name: Upload Inno Setup installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-setup
          path: dist/TranslatorHoi4_Setup_*.exe

  # --- PACKAGE LINUX (DEB + RPM) ---
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg rpm fakeroot

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Linux x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64
          path: ./dist/TranslatorHoi4

      - name: Create .deb package (x64)
        run: |
          ./packaging/create-deb.sh ./dist/TranslatorHoi4 "${{ needs.build.outputs.version || '0.1' }}" x64
        shell: bash

      - name: Upload .deb package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-deb
          path: translatorhoi4_*.deb

      - name: Create .rpm package (x64)
        run: |
          ./packaging/create-rpm.sh ./dist/TranslatorHoi4 "${{ needs.build.outputs.version || '0.1' }}" x64
        shell: bash

      - name: Upload .rpm package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-rpm
          path: translatorhoi4-*.rpm

      - name: Download Linux arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Linux arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Create .deb package (arm64)
        if: always()
        run: |
          ./packaging/create-deb.sh ./dist/TranslatorHoi4-arm64 "${{ needs.build.outputs.version || '0.1' }}" arm64
        shell: bash

      - name: Upload .deb package (arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64-deb
          path: translatorhoi4_*_arm64.deb

      - name: Create .rpm package (arm64)
        if: always()
        run: |
          # Skip RPM build for arm64 on x64 runner (cross-compilation not supported)
          echo "Skipping RPM package for arm64 (cross-compilation not supported on x64 runner)"
        shell: bash

  # --- PACKAGE MACOS ---
  package-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-x64
          path: ./dist/TranslatorHoi4

      - name: Upload macOS x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64
          path: ./dist/TranslatorHoi4

      - name: Download macOS arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload macOS arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64
          path: ./dist/TranslatorHoi4-arm64


