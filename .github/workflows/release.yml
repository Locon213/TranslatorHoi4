name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1). Leave empty to auto-increment."
        required: false

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: vars
        run: |
          git fetch --tags
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            latest=$(git tag --sort=-v:refname | head -n 1)
            if [[ $latest =~ ^v?([0-9]+)\.([0-9]+)$ ]]; then
              major=${BASH_REMATCH[1]}
              minor=${BASH_REMATCH[2]}
              ver="$major.$((minor+1))"
            else
              ver="1.0"
            fi
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT
        shell: bash

  build:
    needs: determine-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            python-version: "3.12"
          - os: windows-latest
            arch: arm64
            python-version: "3.12"
          - os: ubuntu-latest
            arch: x64
            python-version: "3.12"
          - os: ubuntu-latest
            arch: arm64
            python-version: "3.12"
          - os: macos-15-intel
            arch: x64
            python-version: "3.12"
          - os: macos-latest
            arch: arm64
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-nuitka
          max-size: 2G
          save: true
          restore: true

      - name: Set up QEMU for arm64
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set MSVC env vars
        if: runner.os == 'Windows'
        run: |
          echo "CL=/Zm500" >> $env:GITHUB_ENV
          echo "MSYS_NO_PATHCONV=1" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Linux deps (x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf dpkg build-essential fakeroot rpm

      - name: Linux deps (arm64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf dpkg build-essential fakeroot rpm \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg ccache
          brew unlink openssl@3 || true
          clang --version | head -1
          ccache --version | head -1

      - name: Configure ccache
        if: runner.os != 'Windows'
        run: |
          chmod +x ./packaging/setup-ccache.sh ./packaging/show-ccache-stats.sh
          ./packaging/setup-ccache.sh
        shell: bash

      - name: Install Python deps
        run: |
          python -m pip install -U pip wheel setuptools
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build with Nuitka
        env:
          APP_VERSION: ${{ needs.determine-version.outputs.version }}
        run: python build.py
        shell: bash

      - name: Show ccache statistics
        if: runner.os != 'Windows'
        run: ./packaging/show-ccache-stats.sh
        shell: bash

      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "dist/TranslatorHoi4/TranslatorHoi4"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "dist/TranslatorHoi4/TranslatorHoi4.exe" --smoke'

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "true"
        run: xvfb-run -a ./dist/TranslatorHoi4/TranslatorHoi4 --smoke

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        env:
          CI: "true"
        run: |
          test -d "dist/TranslatorHoi4.app/Contents/MacOS"
          test -f "dist/TranslatorHoi4.app/Contents/MacOS/TranslatorHoi4"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorHoi4-${{ runner.os }}-${{ matrix.arch }}
          path: ${{ runner.os == 'macOS' && 'dist/TranslatorHoi4.app/' || 'dist/TranslatorHoi4/' }}
          if-no-files-found: error

  package-windows:
    needs: [build, determine-version]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Windows x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x64
          path: ./dist/TranslatorHoi4

      - name: Build Inno Setup installer (x64)
        shell: pwsh
        run: ./packaging/build-setup.ps1 -Version "${{ needs.determine-version.outputs.version }}" -Architecture "x64" -SourceDir "..\dist\TranslatorHoi4"

      - name: Upload Inno Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-setup-x64
          path: dist/TranslatorHoi4_Setup_*.exe

      - name: Download Windows arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Windows arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Build Inno Setup installer (arm64)
        if: always()
        shell: pwsh
        run: ./packaging/build-setup.ps1 -Version "${{ needs.determine-version.outputs.version }}" -Architecture "arm64" -SourceDir "..\dist\TranslatorHoi4-arm64"

      - name: Upload Inno Setup installer (arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-setup-arm64
          path: dist/TranslatorHoi4_Setup_arm64_*.exe

  package-linux:
    needs: [build, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg rpm fakeroot qemu-user-static

      - name: Make packaging scripts executable
        run: chmod +x ./packaging/create-deb.sh ./packaging/create-rpm.sh
        shell: bash

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Linux x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64
          path: ./dist/TranslatorHoi4

      - name: Create .deb package (x64)
        run: ./packaging/create-deb.sh ./dist/TranslatorHoi4 "${{ needs.determine-version.outputs.version }}" x64
        shell: bash

      - name: Upload .deb package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-deb
          path: translatorhoi4_*_amd64.deb

      - name: Create .rpm package (x64)
        run: ./packaging/create-rpm.sh ./dist/TranslatorHoi4 "${{ needs.determine-version.outputs.version }}" x64
        shell: bash

      - name: Upload .rpm package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-rpm
          path: translatorhoi4-*.x86_64.rpm

      - name: Download Linux arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Linux arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Create .deb package (arm64)
        if: always()
        run: ./packaging/create-deb.sh ./dist/TranslatorHoi4-arm64 "${{ needs.determine-version.outputs.version }}" arm64
        shell: bash

      - name: Upload .deb package (arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64-deb
          path: translatorhoi4_*_arm64.deb

      - name: Create .rpm package (arm64)
        if: always()
        run: ./packaging/create-rpm.sh ./dist/TranslatorHoi4-arm64 "${{ needs.determine-version.outputs.version }}" arm64
        shell: bash

      - name: Upload .rpm package (arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64-rpm
          path: translatorhoi4-*.aarch64.rpm

  package-macos:
    needs: [build, determine-version]
    runs-on: macos-latest
    steps:
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-x64
          path: ./dist/TranslatorHoi4

      - name: Upload macOS x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64
          path: ./dist/TranslatorHoi4

      - name: Create macOS x64 DMG
        run: |
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_x64.dmg" \
            "dist/TranslatorHoi4/"
        shell: bash

      - name: Upload macOS x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64-dmg
          path: TranslatorHoi4_macOS_x64.dmg

      - name: Download macOS arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload macOS arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Create macOS arm64 DMG
        if: always()
        run: |
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_arm64.dmg" \
            "dist/TranslatorHoi4-arm64/"
        shell: bash

      - name: Upload macOS arm64 DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64-dmg
          path: TranslatorHoi4_macOS_arm64.dmg

  release:
    needs: [package-windows, package-linux, package-macos, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./release
          merge-multiple: true

      - name: Generate changelog from commits
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          name: v${{ needs.determine-version.outputs.version }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
