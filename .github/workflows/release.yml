name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1). Leave empty to auto-increment."
        required: false

permissions:
  contents: write

jobs:
  # Determine version first
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: vars
        run: |
          git fetch --tags
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            latest=$(git tag --sort=-v:refname | head -n 1)
            if [[ $latest =~ ^v?([0-9]+)\.([0-9]+)$ ]]; then
              major=${BASH_REMATCH[1]}
              minor=${BASH_REMATCH[2]}
              ver="$major.$((minor+1))"
            else
              ver="1.0"
            fi
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT
        shell: bash

  build:
    needs: determine-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: x64
            python-version: "3.12"
          - os: windows-latest
            arch: arm64
            python-version: "3.12"

          # Linux
          - os: ubuntu-latest
            arch: x64
            python-version: "3.12"
          - os: ubuntu-latest
            arch: arm64
            python-version: "3.12"

          # macOS (macos-15-intel for x64; macos-latest for arm64)
          - os: macos-15-intel
            arch: x64
            python-version: "3.12"
          - os: macos-latest
            arch: arm64
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.arch }}-nuitka
          max-size: 2G

      # Set ccache environment variables for Nuitka
      - name: Set ccache env vars
        run: |
          echo "CCACHE_CPP2=yes" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "CC=/usr/lib/ccache/gcc" >> $GITHUB_ENV
            echo "CXX=/usr/lib/ccache/g++" >> $GITHUB_ENV
          fi
          # For macOS, don't override CC/CXX - Nuitka needs direct clang
          # ccache will still work via the /usr/lib/ccache/ symlinks
        shell: bash

      # Set MSVC heap limit for Windows (prevents C1002 errors on large modules)
      - name: Set MSVC env vars
        if: runner.os == 'Windows'
        run: |
          # Increase compiler heap limit (500MB instead of default)
          echo "CL=/Zm500" >> $env:GITHUB_ENV
        shell: pwsh

      # --- INSTALL SYSTEM DEPS ---

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf \
            build-essential

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg ccache
          pip install pyinstaller
          # Verify clang and ccache are available
          clang --version | head -1
          ccache --version | head -1

      # Configure ccache for macOS (after installing deps)
      - name: Configure ccache
        if: runner.os == 'macOS'
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compiler_check=content
          ccache -p
        shell: bash

      # ---------------------------------

      - name: Install Python deps
        run: |
          python -m pip install -U pip wheel setuptools
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build with Nuitka
        env:
          APP_VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          python build.py
        shell: bash

      # --- SMOKE TESTS ---

      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "dist/TranslatorHoi4/TranslatorHoi4"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "dist/TranslatorHoi4/TranslatorHoi4.exe" --smoke'

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "true"
        run: xvfb-run -a ./dist/TranslatorHoi4/TranslatorHoi4 --smoke

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        env:
          CI: "true"
        run: |
          # Smoke test disabled on macOS - Qt6 segfaults in PyInstaller bundle on CI
          echo "Skipping smoke test on macOS (Qt6 CI environment issue)"
          test -d "dist/TranslatorHoi4.app/Contents/MacOS"
          test -f "dist/TranslatorHoi4.app/Contents/MacOS/TranslatorHoi4"

      # --- UPLOAD ---

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorHoi4-${{ runner.os }}-${{ matrix.arch }}
          path: ${{ runner.os == 'macOS' && 'dist/TranslatorHoi4.app/' || 'dist/TranslatorHoi4/' }}
          if-no-files-found: error

  # --- PACKAGE PLATFORM-SPECIFIC FORMATS ---
  package-windows:
    needs: [build, determine-version]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Windows x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x64
          path: ./dist/TranslatorHoi4

      - name: Download Windows arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Windows arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-arm64
          path: ./dist/TranslatorHoi4-arm64

      # Inno Setup installer (x64)
      - name: Build Inno Setup installer
        if: always()
        run: |
          choco install innosetup --no-progress
          pip install Pillow
          
          # Convert PNG to ICO for Inno Setup
          python -c "
          from PIL import Image
          img = Image.open('assets/icon.png')
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])
          print('Icon converted to ICO format')
          "
          
          iscc packaging\translatorhoi4-setup.iss
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.determine-version.outputs.version }}

      - name: Upload Inno Setup installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-setup
          path: dist/TranslatorHoi4_Setup_*.exe

  package-linux:
    needs: [build, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg rpm fakeroot

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-x64
          path: ./dist/TranslatorHoi4

      - name: Upload Linux x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64
          path: ./dist/TranslatorHoi4

      - name: Create .deb package (x64)
        run: |
          chmod +x packaging/create-deb.sh
          ./packaging/create-deb.sh ./dist/TranslatorHoi4 "${{ needs.determine-version.outputs.version }}" x64
        shell: bash

      - name: Upload .deb package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-deb
          path: translatorhoi4_*.deb

      - name: Create .rpm package (x64)
        run: |
          chmod +x packaging/create-rpm.sh
          ./packaging/create-rpm.sh ./dist/TranslatorHoi4 "${{ needs.determine-version.outputs.version }}" x64
        shell: bash

      - name: Upload .rpm package (x64)
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-rpm
          path: translatorhoi4-*.rpm

      - name: Download Linux arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload Linux arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Create .deb package (arm64)
        if: always()
        run: |
          chmod +x packaging/create-deb.sh
          ./packaging/create-deb.sh ./dist/TranslatorHoi4-arm64 "${{ needs.determine-version.outputs.version }}" arm64
        shell: bash

      - name: Upload .deb package (arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64-deb
          path: translatorhoi4_*_arm64.deb

      - name: Create .rpm package (arm64)
        if: always()
        run: |
          # Skip RPM build for arm64 on x64 runner (cross-compilation not supported)
          echo "Skipping RPM package for arm64 (cross-compilation not supported on x64 runner)"
        shell: bash

  package-macos:
    needs: [build, determine-version]
    runs-on: macos-latest
    steps:
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-x64
          path: ./dist/TranslatorHoi4

      - name: Upload macOS x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64
          path: ./dist/TranslatorHoi4

      - name: Create macOS x64 DMG
        run: |
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_x64.dmg" \
            "dist/TranslatorHoi4/"
        shell: bash

      - name: Upload macOS x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64-dmg
          path: TranslatorHoi4_macOS_x64.dmg

      - name: Download macOS arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Upload macOS arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64
          path: ./dist/TranslatorHoi4-arm64

      - name: Create macOS arm64 DMG
        if: always()
        run: |
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_arm64.dmg" \
            "dist/TranslatorHoi4-arm64/"
        shell: bash

      - name: Upload macOS arm64 DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64-dmg
          path: TranslatorHoi4_macOS_arm64.dmg

  release:
    needs: [package-windows, package-linux, package-macos, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./release
          merge-multiple: true

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            # No previous tag, get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Escape special characters for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          name: v${{ needs.determine-version.outputs.version }}
          body: |
            ## 📋 Changelog

            ${{ steps.changelog.outputs.changelog }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
