name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1). Leave empty to auto-increment."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: x64
            python-version: "3.11"
          - os: windows-latest
            arch: arm64
            python-version: "3.11"

          # Linux
          - os: ubuntu-latest
            arch: x64
            python-version: "3.11"
          - os: ubuntu-latest
            arch: arm64
            python-version: "3.11"

          # macOS (macos-15-intel for x64; macos-latest for arm64)
          - os: macos-15-intel
            arch: x64
            python-version: "3.11"
          - os: macos-latest
            arch: arm64
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      # --- INSTALL SYSTEM DEPS ---

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libdbus-1-3 xvfb \
            libpulse0 patchelf \
            build-essential

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          pip install pyinstaller

      # ---------------------------------

      - name: Determine version
        id: vars
        run: |
          git fetch --tags
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            latest=$(git tag --sort=-v:refname | head -n 1)
            if [[ $latest =~ ^v?([0-9]+)\.([0-9]+)$ ]]; then
              major=${BASH_REMATCH[1]}
              minor=${BASH_REMATCH[2]}
              ver="$major.$((minor+1))"
            else
              ver="1.0"
            fi
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Python deps
        run: |
          python -m pip install -U pip wheel setuptools
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build with Nuitka
        env:
          APP_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python build.py
        shell: bash

      # --- SMOKE TESTS ---

      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "dist/TranslatorHoi4/TranslatorHoi4"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "dist/TranslatorHoi4/TranslatorHoi4.exe" --smoke'

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "true"
        run: xvfb-run -a ./dist/TranslatorHoi4/TranslatorHoi4 --smoke

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        env:
          CI: "true"
        run: ./dist/TranslatorHoi4.app/Contents/MacOS/TranslatorHoi4 --smoke

      # --- UPLOAD ---

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatorHoi4-${{ runner.os }}-${{ matrix.arch }}
          path: ${{ runner.os == 'macOS' && 'dist/TranslatorHoi4.app/' || 'dist/TranslatorHoi4/' }}
          if-no-files-found: error

  # --- PACKAGE PLATFORM-SPECIFIC FORMATS ---
  package-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-x64
          path: ./TranslatorHoi4

      - name: Package Windows x64 ZIP
        run: |
          Compress-Archive -Path TranslatorHoi4 -DestinationPath "TranslatorHoi4_Windows_x64.zip"
        shell: pwsh

      - name: Upload Windows x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x64-zip
          path: TranslatorHoi4_Windows_x64.zip

      - name: Download Windows arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Windows-arm64
          path: ./TranslatorHoi4-arm64

      - name: Package Windows arm64 ZIP
        if: always()
        run: |
          Compress-Archive -Path TranslatorHoi4-arm64 -DestinationPath "TranslatorHoi4_Windows_arm64.zip"
        shell: pwsh

      - name: Upload Windows arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-arm64-zip
          path: TranslatorHoi4_Windows_arm64.zip

  package-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-x64
          path: ./TranslatorHoi4

      - name: Package Linux x64 TAR.GZ
        run: |
          tar -czf TranslatorHoi4_Linux_x64.tar.gz TranslatorHoi4
        shell: bash

      - name: Upload Linux x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64-targz
          path: TranslatorHoi4_Linux_x64.tar.gz

      - name: Download Linux arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-Linux-arm64
          path: ./TranslatorHoi4-arm64

      - name: Package Linux arm64 TAR.GZ
        if: always()
        run: |
          tar -czf TranslatorHoi4_Linux_arm64.tar.gz TranslatorHoi4-arm64
        shell: bash

      - name: Upload Linux arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-arm64-targz
          path: TranslatorHoi4_Linux_arm64.tar.gz

  package-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-x64
          path: ./TranslatorHoi4

      - name: Package macOS x64 DMG
        run: |
          # Artifact already contains .app bundle
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_x64.dmg" \
            "TranslatorHoi4/"
        shell: bash

      - name: Upload macOS x64 package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x64-dmg
          path: TranslatorHoi4_macOS_x64.dmg

      - name: Download macOS arm64 artifact
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: TranslatorHoi4-macOS-arm64
          path: ./TranslatorHoi4-arm64

      - name: Package macOS arm64 DMG
        if: always()
        run: |
          create-dmg \
            --volname "TranslatorHoi4" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "TranslatorHoi4.app" 200 190 \
            --hide-extension "TranslatorHoi4.app" \
            --app-drop-link 600 185 \
            "TranslatorHoi4_macOS_arm64.dmg" \
            "TranslatorHoi4-arm64/"
        shell: bash

      - name: Upload macOS arm64 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-arm64-dmg
          path: TranslatorHoi4_macOS_arm64.dmg

  release:
    needs: [package-windows, package-linux, package-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: vars
        run: |
          git fetch --tags
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            latest=$(git tag --sort=-v:refname | head -n 1)
            if [[ $latest =~ ^v?([0-9]+)\.([0-9]+)$ ]]; then
              major=${BASH_REMATCH[1]}
              minor=${BASH_REMATCH[2]}
              ver="$major.$((minor+1))"
            else
              ver="1.0"
            fi
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./release
          merge-multiple: true

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            # No previous tag, get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Escape special characters for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: v${{ steps.vars.outputs.version }}
          body: |
            ## 📋 Changelog

            ${{ steps.changelog.outputs.changelog }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
