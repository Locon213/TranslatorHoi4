# Nuitka configuration file for TranslatorHoi4
# This file complements build.py

[nuitka]
# Mode
standalone = yes
onefile = no

# Plugins
enable-plugin = pyqt6

# Include data
include-data-dir = assets=assets

# Include packages
include-package = translatorhoi4
include-package = openai
include-package = anthropic
include-package = google
include-package = googletrans
include-package = deep_translator
include-package = deepl
include-package = groq
include-package = together
include-package = mistralai
include-package = aiohttp
include-package = requests
include-package = regex
include-package = yaml
include-package = dotenv
include-package = loguru
include-package = toml
include-package = fluentqt

# Exclude unnecessary modules
nofollow-import-to = pytest
nofollow-import-to = unittest
nofollow-import-to = tkinter
nofollow-import-to = PyQt6.QtWebEngineCore
nofollow-import-to = PyQt6.QtWebEngineWidgets
nofollow-import-to = PyQt6.QtQml
nofollow-import-to = PyQt6.QtQuick
nofollow-import-to = PyQt6.Qt3DCore
nofollow-import-to = PyQt6.Qt3DInput
nofollow-import-to = PyQt6.Qt3DRender
nofollow-import-to = PyQt6.QtMultimedia
nofollow-import-to = PyQt6.QtSql
nofollow-import-to = PyQt6.QtNetworkAuth
nofollow-import-to = PyQt6.QtNfc
nofollow-import-to = PyQt6.QtBluetooth
nofollow-import-to = PyQt6.QtPositioning
nofollow-import-to = PyQt6.QtSensors
nofollow-import-to = PyQt6.QtSerialPort
nofollow-import-to = PyQt6.QtCharts
nofollow-import-to = PyQt6.QtDataVisualization

# Optimization
lto = yes
assume-yes-for-downloads = yes
remove-output = yes

# Version info (overridden by environment)
company-name = Locon213
product-name = TranslatorHoi4
file-description = Cross-platform Paradox localisation translator with AI
copyright = MIT

# Platform-specific
# Windows
windows-console-mode = disable

# macOS
macos-create-app-bundle = yes
macos-app-name = TranslatorHoi4

# Icons (paths relative to project root)
# windows-icon-from-ico = assets/icon.png
# macos-app-icon = assets/icon.png
# linux-icon = assets/icon.png
